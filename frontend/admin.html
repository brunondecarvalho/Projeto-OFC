<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Esfiharia Premium</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <button onclick="window.location.href='index.html'" class="back-btn" title="Ver Loja">❮</button>
            <div class="logo">Painel Gestor</div>
        </div>
        <button onclick="logout()" style="background:none; border:none; color:var(--primary-red); font-weight:bold; cursor:pointer;">Sair</button>
    </header>

    <main class="container">
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="switchTab('pedidos')">📦 Pedidos</button>
            <button class="tab-btn" onclick="switchTab('config')">⚙️ Configurações</button>
        </div>

        <div id="pedidos" class="tab-content active">
            <h2 style="margin-bottom: 20px; color: var(--text-main);">Gerenciamento de Pedidos</h2>
            <div id="orders-list">Carregando pedidos...</div>
        </div>

        <div id="config" class="tab-content">
            <h2 style="margin-bottom: 20px; color: var(--text-main);">Configurações</h2>
            <div class="order-card">
                <label style="display:flex; align-items:center; gap:10px; font-weight:bold; margin-bottom:20px; font-size:1.1rem; cursor: pointer;">
                    <input type="checkbox" id="isOpen" style="width:25px; height:25px; margin:0; accent-color: var(--success-green);">
                    Loja Aberta para Pedidos
                </label>
                <label style="font-weight:bold; display:block; margin-bottom: 5px;">Tempo Estimado de Entrega</label>
                <input type="text" id="estimatedTime" placeholder="Ex: 40-50 min">
                <label style="font-weight:bold; display:block; margin-bottom: 5px;">Chave PIX</label>
                <input type="text" id="pixKey" placeholder="Seu CPF ou Celular">
                <button class="btn" style="margin-top: 10px;" onclick="saveConfig()">Salvar Configurações</button>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
